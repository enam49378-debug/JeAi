<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JcAi — Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="chat-layout">

  <!-- Header -->
  <header class="chat-header">
    <a href="index.html" class="btn btn-ghost" style="padding:8px 12px;">← Volver</a>
    <div class="chat-header-avatar" id="headerAvatar">?</div>
    <div class="chat-header-info">
      <div class="chat-header-name" id="headerName">Cargando...</div>
      <div class="chat-header-status" id="headerStatus">IA activa</div>
    </div>
    <div class="chat-header-actions">
      <button class="btn btn-ghost" onclick="toggleConsole()" style="font-size:0.8rem">🖥 Consola</button>
      <button class="btn btn-danger" onclick="confirmClear()">🗑 Limpiar</button>
    </div>
  </header>

  <!-- Mensajes -->
  <div class="chat-messages" id="chatMessages"></div>

  <!-- Consola de errores -->
  <div id="errorConsole" style="display:none; background:#0d0d1a; border-top:1px solid #f76a8a; padding:12px 20px; max-height:150px; overflow-y:auto; font-family:monospace; font-size:0.78rem; color:#f76a8a;">
    <div style="color:#6b6b80; margin-bottom:6px;">── Consola ──</div>
    <div id="consoleOutput"></div>
  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <div class="chat-input-row">
      <textarea
        id="messageInput"
        placeholder="Escribe algo..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="memory-hint" id="memoryHint"></div>
  </div>

</div>

<script src="characters.js"></script>
<script>
  // ─── CONFIG ───────────────────────────────────────────────
  const GEMINI_KEY = 'AIzaSyD1OkMgkEZimTDAN3B-3agH7KdKUmUcALU'; // ← pon tu key aquí
  const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;

  // ─── ESTADO ───────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const charId = params.get('id');
  let character = null;
  let messages = [];
  let isLoading = false;

  // ─── CONSOLA VISIBLE ──────────────────────────────────────
  function logConsole(msg, type = 'info') {
    const out = document.getElementById('consoleOutput');
    const color = type === 'error' ? '#f76a8a' : type === 'ok' ? '#7c6af7' : '#6b6b80';
    const time = new Date().toLocaleTimeString();
    out.innerHTML += `<div style="color:${color}">[${time}] ${msg}</div>`;
    out.scrollTop = out.scrollHeight;
    if (type === 'error') {
      document.getElementById('errorConsole').style.display = 'block';
    }
  }

  function toggleConsole() {
    const c = document.getElementById('errorConsole');
    c.style.display = c.style.display === 'none' ? 'block' : 'none';
  }

  // ─── INIT ─────────────────────────────────────────────────
  function init() {
    const chars = loadCharacters();
    character = chars.find(c => c.id === charId);

    if (!character) {
      document.getElementById('chatMessages').innerHTML = `
        <div class="empty-state">
          <div class="big-emoji">😕</div>
          <p>Personaje no encontrado. <a href="index.html" style="color:var(--accent)">Volver</a></p>
        </div>`;
      return;
    }

    document.title = `JcAi — ${character.name}`;
    document.getElementById('headerAvatar').textContent = character.emoji;
    document.getElementById('headerName').textContent = character.name;

    messages = loadHistory(charId);

    if (messages.length === 0) {
      const greeting = { role: 'assistant', content: character.greeting };
      messages.push(greeting);
      saveHistory(charId, messages);
    }

    renderMessages();
    updateMemoryHint();
    scrollToBottom();
    logConsole('Personaje cargado: ' + character.name, 'ok');
  }

  // ─── RENDER ───────────────────────────────────────────────
  function renderMessages() {
    const container = document.getElementById('chatMessages');
    container.innerHTML = messages.map(m => buildBubble(m)).join('');
  }

  function buildBubble(msg) {
    const isUser = msg.role === 'user';
    const avatar = isUser ? '👤' : character.emoji;
    return `
      <div class="message ${isUser ? 'user' : 'ai'}">
        <div class="msg-avatar">${avatar}</div>
        <div class="msg-bubble">${escapeHtml(msg.content)}</div>
      </div>`;
  }

  function appendBubble(msg) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.innerHTML = buildBubble(msg);
    container.appendChild(div.firstElementChild);
    scrollToBottom();
  }

  function showTyping() {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.id = 'typingIndicator';
    div.className = 'message ai';
    div.innerHTML = `
      <div class="msg-avatar">${character.emoji}</div>
      <div class="msg-bubble">
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>`;
    container.appendChild(div);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function scrollToBottom() {
    const c = document.getElementById('chatMessages');
    setTimeout(() => c.scrollTop = c.scrollHeight, 50);
  }

  function updateMemoryHint() {
    const count = messages.length;
    const hint = document.getElementById('memoryHint');
    if (count >= MAX_MEMORY - 5) {
      hint.textContent = `Memoria: ${count}/${MAX_MEMORY} — los más antiguos se borrarán pronto.`;
    } else {
      hint.textContent = `Memoria activa: ${count} mensajes`;
    }
  }

  // ─── ENVIAR MENSAJE ───────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text || isLoading) return;

    const userMsg = { role: 'user', content: text };
    messages.push(userMsg);
    saveHistory(charId, messages);
    appendBubble(userMsg);

    input.value = '';
    input.style.height = 'auto';
    setLoading(true);
    showTyping();
    updateMemoryHint();

    try {
      logConsole('Enviando mensaje a Gemini...');
      const reply = await callGemini();
      removeTyping();
      const aiMsg = { role: 'assistant', content: reply };
      messages.push(aiMsg);
      saveHistory(charId, messages);
      appendBubble(aiMsg);
      updateMemoryHint();
      logConsole('Respuesta recibida ✓', 'ok');
    } catch (err) {
      removeTyping();
      logConsole('ERROR: ' + err.message, 'error');
      const errMsg = { role: 'assistant', content: `⚠️ Error: ${err.message}` };
      appendBubble(errMsg);
    }

    setLoading(false);
  }

  // ─── LLAMADA A GEMINI ─────────────────────────────────────
  async function callGemini() {
    let raw = messages.slice(-MAX_MEMORY);

    // Construir contents alternando roles correctamente
    let contents = [];
    for (const m of raw) {
      const role = m.role === 'assistant' ? 'model' : 'user';
      if (contents.length > 0 && contents[contents.length - 1].role === role) {
        // Fusionar mensajes consecutivos del mismo rol
        contents[contents.length - 1].parts[0].text += '\n' + m.content;
      } else {
        contents.push({ role, parts: [{ text: m.content }] });
      }
    }

    // Gemini no puede empezar con 'model'
    while (contents.length > 0 && contents[0].role === 'model') {
      contents.shift();
    }

    if (contents.length === 0) throw new Error('No hay mensajes para enviar.');

    logConsole(`Historial: ${contents.length} turnos`);

    const body = {
      system_instruction: {
        parts: [{ text: character.personality + '\n\nResponde siempre en español a menos que el usuario escriba en otro idioma. Sé fiel a tu personalidad.' }]
      },
      contents
    };

    const response = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await response.json();

    if (!response.ok) {
      logConsole('Respuesta API: ' + JSON.stringify(data), 'error');
      throw new Error(data.error?.message || `HTTP ${response.status}`);
    }

    if (!data.candidates || !data.candidates[0]) {
      logConsole('Sin candidatos: ' + JSON.stringify(data), 'error');
      throw new Error('Gemini no devolvió respuesta.');
    }

    return data.candidates[0].content.parts[0].text;
  }

  // ─── UI HELPERS ───────────────────────────────────────────
  function setLoading(val) {
    isLoading = val;
    document.getElementById('sendBtn').disabled = val;
    document.getElementById('headerStatus').textContent = val ? 'Escribiendo...' : 'IA activa';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function confirmClear() {
    if (confirm(`¿Borrar todo el historial con ${character.name}?`)) {
      messages = [];
      clearHistory(charId);
      messages.push({ role: 'assistant', content: character.greeting });
      saveHistory(charId, messages);
      renderMessages();
      updateMemoryHint();
      scrollToBottom();
      logConsole('Historial borrado', 'ok');
    }
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  // ─── START ────────────────────────────────────────────────
  init();
</script>
</body>
</html>
