<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JcAi вҖ” Personajes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- в”Җв”Җв”Җ AUTH OVERLAY в”Җв”Җв”Җ -->
<div class="auth-overlay" id="authOverlay"></div>

<nav>
  <span class="nav-logo">JcAi</span>
  <div class="nav-actions">
    <div class="nav-user" id="navUser" style="display:none">
      <div class="nav-user-avatar" id="navUserPhoto"></div>
      <span class="nav-user-name" id="navUserName"></span>
      <button class="btn btn-ghost btn-sm" onclick="logOut()">Salir</button>
    </div>
    <button class="btn btn-primary" onclick="openModal()">+ Nuevo personaje</button>
  </div>
</nav>

<section class="hero">
  <h1>Habla con tus<br><span>personajes IA</span></h1>
  <p>Crea y chatea con personajes Гәnicos impulsados por inteligencia artificial.</p>
  <button class="btn btn-primary" onclick="openModal()">вңҰ Crear personaje</button>
</section>

<section class="section">
  <div class="section-header">
    <h2>Tus personajes</h2>
  </div>
  <div class="characters-grid" id="charactersGrid">
    <!-- Skeleton loader -->
    <div class="char-card skeleton"></div>
    <div class="char-card skeleton"></div>
    <div class="char-card skeleton"></div>
  </div>
</section>

<!-- в”Җв”Җв”Җ MODAL CREAR PERSONAJE в”Җв”Җв”Җ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>вңҰ Nuevo personaje</h2>

    <div class="form-group">
      <label>Nombre</label>
      <input type="text" id="charName" placeholder="Ej: Luna, Rex, Aria..." maxlength="30" />
    </div>

    <div class="form-group">
      <label>Emoji / Avatar</label>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>

    <div class="form-group">
      <label>DescripciГіn corta</label>
      <input type="text" id="charDesc" placeholder="Una frase que lo describa..." maxlength="80" />
    </div>

    <div class="form-group">
      <label>Etiqueta</label>
      <input type="text" id="charTag" placeholder="Ej: Amigable, Sabio, Divertido..." maxlength="20" />
    </div>

    <div class="form-group">
      <label>Personalidad (instrucciones para la IA)</label>
      <textarea id="charPersonality" placeholder="Ej: Eres un samurГЎi sabio que habla con calma y usa proverbios japoneses. Siempre eres respetuoso y reflexivo..."></textarea>
    </div>

    <div class="form-group">
      <label>Mensaje de saludo</label>
      <input type="text" id="charGreeting" placeholder="Lo primero que dirГЎ al iniciar chat..." maxlength="200" />
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="createBtn" onclick="createCharacter()">Crear personaje</button>
    </div>
  </div>
</div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="characters.js"></script>
<script src="auth.js"></script>

<script>
  // в”Җв”Җв”Җ EMOJIS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const EMOJIS = ['рҹҳҠ','рҹҢҷ','рҹ”Ҙ','рҹӨ–','рҹ§ҷ','вҡ”пёҸ','рҹҢё','рҹҰӢ','рҹҗү','рҹҢҠ','вҡЎ','рҹҺӯ','рҹ‘ҫ','рҹҰҠ','рҹҗә','рҹҢә','рҹ’Һ','рҹ—ЎпёҸ','рҹ§ ','рҹҺӘ','рҹҢҲ','рҹҰ…','рҹҗ¬','рҹҢҝ','вңЁ','рҹҺҜ','рҹҸ”пёҸ','рҹҢҢ'];
  let selectedEmoji = EMOJIS[0];

  // в”Җв”Җв”Җ CALLBACK DE AUTH в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  function onUserAuthenticated(user) {
    // Mostrar info del usuario en la nav
    const navUser = document.getElementById('navUser');
    navUser.style.display = 'flex';
    document.getElementById('navUserName').textContent = user.displayName || user.email;

    const photoEl = document.getElementById('navUserPhoto');
    if (user.photoURL) {
      photoEl.style.backgroundImage = `url(${user.photoURL})`;
      photoEl.style.backgroundSize = 'cover';
    } else {
      photoEl.textContent = (user.displayName || user.email || '?')[0].toUpperCase();
    }

    renderGrid();
  }

  // в”Җв”Җв”Җ RENDER GRID в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  async function renderGrid() {
    const grid = document.getElementById('charactersGrid');
    grid.innerHTML = '<div class="char-card skeleton"></div><div class="char-card skeleton"></div><div class="char-card skeleton"></div>';

    try {
      const chars = await loadCharacters(currentUid);

      grid.innerHTML = chars.map((c, i) => `
        <div class="char-card" style="animation-delay:${i * 0.07}s" onclick="goToChat('${c.id}')">
          <button class="char-delete-btn" onclick="event.stopPropagation(); confirmDelete('${c.id}', '${c.name}')" title="Eliminar">Г—</button>
          <div class="char-avatar">${c.emoji}</div>
          <div class="char-name">${c.name}</div>
          <div class="char-desc">${c.description}</div>
          <span class="char-tag">${c.tag}</span>
        </div>
      `).join('') + `
        <div class="char-card char-card-new" onclick="openModal()">
          <div class="plus-icon">+</div>
          <span>Crear personaje</span>
        </div>
      `;
    } catch (e) {
      grid.innerHTML = `<p style="color:var(--text-muted);padding:20px">Error al cargar personajes: ${e.message}</p>`;
    }
  }

  // в”Җв”Җв”Җ CREAR PERSONAJE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  async function createCharacter() {
    const name        = document.getElementById('charName').value.trim();
    const desc        = document.getElementById('charDesc').value.trim();
    const tag         = document.getElementById('charTag').value.trim();
    const personality = document.getElementById('charPersonality').value.trim();
    const greeting    = document.getElementById('charGreeting').value.trim();

    if (!name)        return alert('El personaje necesita un nombre.');
    if (!personality) return alert('Escribe la personalidad del personaje.');

    const btn = document.getElementById('createBtn');
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    try {
      const newChar = {
        id:          generateId(),
        name,
        emoji:       selectedEmoji,
        description: desc || 'Un personaje misterioso.',
        tag:         tag  || 'Original',
        personality,
        greeting:    greeting || `Hola, soy ${name}. ВҝEn quГ© puedo ayudarte?`,
        createdAt:   Date.now()
      };

      await saveCharacter(currentUid, newChar);
      closeModal();
      await renderGrid();
    } catch (e) {
      alert('Error al guardar: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Crear personaje';
    }
  }

  // в”Җв”Җв”Җ ELIMINAR PERSONAJE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  async function confirmDelete(id, name) {
    if (!confirm(`ВҝEliminar a ${name}? TambiГ©n se borrarГЎ su historial.`)) return;
    try {
      await deleteCharacter(currentUid, id);
      await renderGrid();
    } catch (e) {
      alert('Error al eliminar: ' + e.message);
    }
  }

  // в”Җв”Җв”Җ MODAL в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  function renderEmojiGrid() {
    const grid = document.getElementById('emojiGrid');
    grid.innerHTML = EMOJIS.map(e => `
      <button class="emoji-btn ${e === selectedEmoji ? 'selected' : ''}" onclick="selectEmoji('${e}')">${e}</button>
    `).join('');
  }

  function selectEmoji(e) {
    selectedEmoji = e;
    renderEmojiGrid();
  }

  function openModal() {
    document.getElementById('modalOverlay').classList.add('open');
    selectedEmoji = EMOJIS[0];
    renderEmojiGrid();
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    clearForm();
  }

  function clearForm() {
    ['charName','charDesc','charTag','charPersonality','charGreeting'].forEach(id => {
      document.getElementById(id).value = '';
    });
    selectedEmoji = EMOJIS[0];
  }

  function goToChat(id) {
    window.location.href = `chat.html?id=${id}`;
  }

  // Cerrar modal al click afuera
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
