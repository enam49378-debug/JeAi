<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JcAi — Personajes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ─── AUTH OVERLAY ─── -->
<div class="auth-overlay" id="authOverlay"></div>

<nav>
  <span class="nav-logo">JcAi</span>
  <div class="nav-actions">
    <a href="https://enam49378-debug.github.io/JeAi/" target="_blank" class="btn btn-ghost btn-sm" style="font-size:0.78rem; opacity:0.6" title="Ver sitio">🌐 Sitio</a>
    <div class="nav-user" id="navUser" style="display:none">
      <a href="profile.html" style="display:flex; align-items:center; gap:8px; text-decoration:none; color:inherit">
        <div class="nav-user-avatar" id="navUserPhoto"></div>
        <span class="nav-user-name" id="navUserName"></span>
      </a>
      <button class="btn btn-ghost btn-sm" onclick="logOut()">Salir</button>
    </div>
    <button class="btn btn-primary" onclick="openModal()">+ Nuevo personaje</button>
  </div>
</nav>

<section class="hero">
  <h1>Habla con tus<br><span>personajes IA</span></h1>
  <p>Crea y chatea con personajes únicos impulsados por inteligencia artificial.</p>
  <button class="btn btn-primary" onclick="openModal()">✦ Crear personaje</button>
</section>

<section class="section">
  <div class="section-header">
    <h2>Tus personajes</h2>
  </div>
  <div class="characters-grid" id="charactersGrid">
    <!-- Skeleton loader -->
    <div class="char-card skeleton"></div>
    <div class="char-card skeleton"></div>
    <div class="char-card skeleton"></div>
  </div>
</section>

<!-- ─── MODAL CREAR PERSONAJE ─── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>✦ Nuevo personaje</h2>

    <!-- Image upload -->
    <div class="img-upload-area">
      <div class="img-upload-circle" id="imgUploadCircle" onclick="document.getElementById('imgFileInput').click()">
        <span id="imgUploadEmoji">📷</span>
        <div class="edit-overlay">✏️</div>
      </div>
      <input type="file" id="imgFileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)" />
      <span class="img-upload-hint">Foto de perfil del personaje</span>
    </div>

    <div class="form-group">
      <label>Nombre del personaje <span class="field-count" id="nameCount">0/30</span></label>
      <input type="text" id="charName" placeholder="Ej: Luna, Rex, Aria..." maxlength="30" oninput="updateCount('charName','nameCount',30)" />
    </div>

    <div class="form-group">
      <label>Eslogan <span class="field-count" id="sloganCount">0/50</span></label>
      <input type="text" id="charSlogan" placeholder="Una frase corta que lo describa..." maxlength="50" oninput="updateCount('charSlogan','sloganCount',50)" />
    </div>

    <div class="form-group">
      <label>Descripción <span class="field-count" id="descCount">0/300</span></label>
      <textarea id="charDesc" placeholder="¿Cómo se describiría a sí mismo tu personaje?" maxlength="300" rows="3" oninput="updateCount('charDesc','descCount',300)"></textarea>
    </div>

    <div class="form-group">
      <label>Personalidad (instrucciones para la IA)</label>
      <textarea id="charPersonality" placeholder="Ej: Eres un samurái sabio que habla con calma y usa proverbios japoneses. Siempre eres respetuoso y reflexivo..." rows="4"></textarea>
    </div>

    <div class="form-group">
      <label>Saludo inicial <span class="field-count" id="greetCount">0/300</span></label>
      <textarea id="charGreeting" placeholder="Lo primero que dirá al iniciar el chat..." maxlength="300" rows="3" oninput="updateCount('charGreeting','greetCount',300)"></textarea>
    </div>

    <div class="form-group">
      <label>Etiqueta</label>
      <input type="text" id="charTag" placeholder="Ej: Amigable, Sabio, Divertido..." maxlength="20" />
    </div>

    <div class="form-group">
      <label>Visibilidad</label>
      <div class="visibility-row">
        <button class="vis-btn active" id="visPublic"  onclick="setVisibility('public')">🌐 Público</button>
        <button class="vis-btn"        id="visPrivate" onclick="setVisibility('private')">🔒 Privado</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="createBtn" onclick="createCharacter()">Crear personaje</button>
    </div>
  </div>
</div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="characters.js"></script>
<script src="auth.js"></script>

<script>
  // ─── ESTADO MODAL ─────────────────────────────────────────
  let charImageData = '';    // base64 de la imagen subida
  let charVisibility = 'public';

  // ─── CALLBACK DE AUTH ─────────────────────────────────────
  function onUserAuthenticated(user) {
    const navUser = document.getElementById('navUser');
    navUser.style.display = 'flex';
    document.getElementById('navUserName').textContent = user.displayName || user.email;

    const photoEl = document.getElementById('navUserPhoto');
    if (user.photoURL) {
      photoEl.style.backgroundImage = `url(${user.photoURL})`;
      photoEl.style.backgroundSize = 'cover';
    } else {
      photoEl.textContent = (user.displayName || user.email || '?')[0].toUpperCase();
    }

    renderGrid();
  }

  // ─── RENDER GRID ──────────────────────────────────────────
  async function renderGrid() {
    const grid = document.getElementById('charactersGrid');
    grid.innerHTML = '<div class="char-card skeleton"></div><div class="char-card skeleton"></div><div class="char-card skeleton"></div>';

    try {
      const chars = await loadCharacters(currentUid);

      grid.innerHTML = chars.map((c, i) => {
        const bg   = c.imageUrl ? `url(${c.imageUrl})` : `linear-gradient(135deg, hsl(${(i*60+220)%360},40%,18%), hsl(${(i*60+260)%360},50%,12%))`;
        const tag  = c.tag ? `<span class="char-tag">${c.tag}</span>` : '';
        return `
          <div class="char-card" style="animation-delay:${i * 0.07}s" onclick="goToChat('${c.id}')">
            ${tag}
            <button class="char-delete-btn" onclick="event.stopPropagation(); confirmDelete('${c.id}', '${c.name}')" title="Eliminar">×</button>
            <div class="char-card-bg" style="background-image:${bg}"></div>
            <div class="char-card-footer">
              <div class="char-avatar">${c.emoji || '🤖'}</div>
              <div class="char-name">${c.name}</div>
              <div class="char-desc">${c.description}</div>
            </div>
          </div>`;
      }).join('') + `
        <div class="char-card char-card-new" onclick="openModal()">
          <div class="plus-icon">+</div>
          <span>Crear personaje</span>
        </div>`;
    } catch (e) {
      grid.innerHTML = `<p style="color:var(--text-muted);padding:20px">Error al cargar personajes: ${e.message}</p>`;
    }
  }

  // ─── IMAGE UPLOAD ─────────────────────────────────────────
  function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      // Resize image with canvas
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 400;
        let w = img.width, h = img.height;
        if (w > h) { h = h * MAX / w; w = MAX; } else { w = w * MAX / h; h = MAX; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        charImageData = canvas.toDataURL('image/jpeg', 0.75);
        const circle = document.getElementById('imgUploadCircle');
        circle.style.backgroundImage = `url(${charImageData})`;
        document.getElementById('imgUploadEmoji').style.display = 'none';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ─── VISIBILITY ───────────────────────────────────────────
  function setVisibility(v) {
    charVisibility = v;
    document.getElementById('visPublic').classList.toggle('active', v === 'public');
    document.getElementById('visPrivate').classList.toggle('active', v === 'private');
  }

  // ─── COUNTER HELPERS ──────────────────────────────────────
  function updateCount(inputId, countId, max) {
    const len = document.getElementById(inputId).value.length;
    document.getElementById(countId).textContent = `${len}/${max}`;
  }

  // ─── CREAR PERSONAJE ──────────────────────────────────────
  async function createCharacter() {
    const name        = document.getElementById('charName').value.trim();
    const slogan      = document.getElementById('charSlogan').value.trim();
    const desc        = document.getElementById('charDesc').value.trim();
    const tag         = document.getElementById('charTag').value.trim();
    const personality = document.getElementById('charPersonality').value.trim();
    const greeting    = document.getElementById('charGreeting').value.trim();

    if (!name)        return alert('El personaje necesita un nombre.');
    if (!personality) return alert('Escribe la personalidad del personaje.');

    const btn = document.getElementById('createBtn');
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    try {
      const newChar = {
        id:          generateId(),
        name,
        slogan:      slogan || '',
        emoji:       '🤖',
        imageUrl:    charImageData || '',
        description: desc || slogan || 'Un personaje misterioso.',
        tag:         tag  || 'Original',
        personality,
        greeting:    greeting || `Hola, soy ${name}. ¿En qué puedo ayudarte?`,
        visibility:  charVisibility,
        createdAt:   Date.now()
      };

      await saveCharacter(currentUid, newChar);
      closeModal();
      await renderGrid();
    } catch (e) {
      alert('Error al guardar: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Crear personaje';
    }
  }

  // ─── ELIMINAR PERSONAJE ───────────────────────────────────
  async function confirmDelete(id, name) {
    if (!confirm(`¿Eliminar a ${name}? También se borrará su historial.`)) return;
    try {
      await deleteCharacter(currentUid, id);
      await renderGrid();
    } catch (e) {
      alert('Error al eliminar: ' + e.message);
    }
  }

  // ─── MODAL ────────────────────────────────────────────────
  function openModal() {
    document.getElementById('modalOverlay').classList.add('open');
    charImageData  = '';
    charVisibility = 'public';
    document.getElementById('imgUploadCircle').style.backgroundImage = '';
    document.getElementById('imgUploadEmoji').style.display = '';
    setVisibility('public');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    clearForm();
  }

  function clearForm() {
    ['charName','charSlogan','charDesc','charTag','charPersonality','charGreeting'].forEach(id => {
      document.getElementById(id).value = '';
    });
    ['nameCount','sloganCount','descCount','greetCount'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = el.textContent.replace(/^\d+/, '0');
    });
    charImageData = '';
  }

  function goToChat(id) {
    window.location.href = `chat.html?id=${id}`;
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
