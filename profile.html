<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JcAi — Mi perfil</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .profile-layout {
      max-width: 560px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .profile-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.88rem;
      margin-bottom: 32px;
      text-decoration: none;
      transition: color 0.2s;
    }
    .profile-back:hover { color: var(--accent); }

    .profile-avatar-section {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 36px;
      padding: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .profile-avatar-big {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--surface2);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
      overflow: hidden;
      background-size: cover;
      background-position: center;
    }

    .profile-avatar-info h3 {
      font-size: 1.1rem;
      margin-bottom: 4px;
    }
    .profile-avatar-info p {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
    }

    .profile-card h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.78rem;
    }

    .profile-field {
      margin-bottom: 16px;
    }
    .profile-field label {
      display: block;
      font-size: 0.83rem;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .profile-field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .profile-field input:focus { border-color: var(--accent); }
    .profile-field input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .profile-field .field-hint {
      font-size: 0.76rem;
      color: var(--text-muted);
      margin-top: 5px;
    }

    .profile-save-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
    }

    .profile-success {
      font-size: 0.83rem;
      color: #4ade80;
      display: none;
    }
    .profile-error-msg {
      font-size: 0.83rem;
      color: var(--accent2);
      display: none;
    }

    .danger-zone {
      border-color: rgba(247,106,138,0.3);
    }
    .danger-zone h3 { color: var(--accent2); }

    .provider-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<!-- ─── AUTH OVERLAY ─── -->
<div class="auth-overlay" id="authOverlay"></div>

<nav>
  <span class="nav-logo">JcAi</span>
  <div class="nav-actions">
    <a href="index.html" class="btn btn-ghost">← Personajes</a>
  </div>
</nav>

<div class="profile-layout">

  <!-- Avatar section -->
  <div class="profile-avatar-section">
    <div class="profile-avatar-big" id="profileAvatarBig"></div>
    <div class="profile-avatar-info">
      <h3 id="profileDisplayName">Cargando...</h3>
      <p id="profileEmail"></p>
      <div style="margin-top:8px">
        <span class="provider-badge" id="providerBadge">—</span>
      </div>
    </div>
  </div>

  <!-- Editar perfil -->
  <div class="profile-card">
    <h3>Información del perfil</h3>

    <div class="profile-field">
      <label>Nombre de usuario</label>
      <input type="text" id="inputName" placeholder="Tu nombre..." maxlength="40" />
    </div>

    <div class="profile-field">
      <label>URL de foto de perfil</label>
      <input type="url" id="inputPhoto" placeholder="https://..." />
      <div class="field-hint">Pega la URL de cualquier imagen de internet.</div>
    </div>

    <div class="profile-save-row">
      <button class="btn btn-primary" id="saveBtn" onclick="saveProfile()">Guardar cambios</button>
      <span class="profile-success" id="successMsg">✓ Guardado</span>
      <span class="profile-error-msg" id="errorMsg"></span>
    </div>
  </div>

  <!-- Cambiar contraseña (solo email) -->
  <div class="profile-card" id="passwordCard" style="display:none">
    <h3>Cambiar contraseña</h3>

    <div class="profile-field">
      <label>Nueva contraseña</label>
      <input type="password" id="inputNewPass" placeholder="Mínimo 6 caracteres" />
    </div>

    <div class="profile-save-row">
      <button class="btn btn-ghost" onclick="changePassword()">Actualizar contraseña</button>
      <span class="profile-success" id="passSuccessMsg">✓ Contraseña actualizada</span>
      <span class="profile-error-msg" id="passErrorMsg"></span>
    </div>
  </div>

  <!-- Zona de peligro -->
  <div class="profile-card danger-zone">
    <h3>Zona de peligro</h3>
    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:16px; line-height:1.6">
      Cerrar sesión te desconecta de este dispositivo. Tus personajes seguirán guardados en la nube.
    </p>
    <div style="display:flex; gap:10px; flex-wrap:wrap">
      <button class="btn btn-ghost" onclick="logOut().then(() => window.location.href='index.html')">Cerrar sesión</button>
      <button class="btn btn-danger" onclick="confirmDeleteAccount()">Eliminar cuenta</button>
    </div>
  </div>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="characters.js"></script>
<script src="auth.js"></script>

<script>
  function onUserAuthenticated(user) {
    renderProfile(user);
  }

  function renderProfile(user) {
    // Avatar
    const avatarEl = document.getElementById('profileAvatarBig');
    if (user.photoURL) {
      avatarEl.style.backgroundImage = `url(${user.photoURL})`;
    } else {
      avatarEl.textContent = (user.displayName || user.email || '?')[0].toUpperCase();
    }

    document.getElementById('profileDisplayName').textContent = user.displayName || '(sin nombre)';
    document.getElementById('profileEmail').textContent = user.email || '';

    // Prellenar campos
    document.getElementById('inputName').value  = user.displayName || '';
    document.getElementById('inputPhoto').value = user.photoURL    || '';

    // Proveedor
    const providerId = user.providerData[0]?.providerId || '';
    const badge      = document.getElementById('providerBadge');
    if (providerId === 'google.com') {
      badge.innerHTML = '🔵 Cuenta Google';
    } else if (providerId === 'password') {
      badge.innerHTML = '✉️ Correo y contraseña';
      document.getElementById('passwordCard').style.display = 'block';
    } else {
      badge.textContent = providerId;
    }
  }

  async function saveProfile() {
    const name  = document.getElementById('inputName').value.trim();
    const photo = document.getElementById('inputPhoto').value.trim();
    const btn   = document.getElementById('saveBtn');
    const ok    = document.getElementById('successMsg');
    const err   = document.getElementById('errorMsg');

    ok.style.display  = 'none';
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    try {
      await auth.currentUser.updateProfile({
        displayName: name  || null,
        photoURL:    photo || null
      });

      // Refrescar vista
      renderProfile(auth.currentUser);
      ok.style.display = 'inline';
      setTimeout(() => ok.style.display = 'none', 3000);
    } catch (e) {
      err.textContent   = 'Error: ' + e.message;
      err.style.display = 'inline';
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Guardar cambios';
    }
  }

  async function changePassword() {
    const newPass = document.getElementById('inputNewPass').value;
    const ok      = document.getElementById('passSuccessMsg');
    const err     = document.getElementById('passErrorMsg');

    ok.style.display  = 'none';
    err.style.display = 'none';

    if (!newPass || newPass.length < 6) {
      err.textContent   = 'La contraseña debe tener al menos 6 caracteres.';
      err.style.display = 'inline';
      return;
    }

    try {
      await auth.currentUser.updatePassword(newPass);
      document.getElementById('inputNewPass').value = '';
      ok.style.display = 'inline';
      setTimeout(() => ok.style.display = 'none', 3000);
    } catch (e) {
      if (e.code === 'auth/requires-recent-login') {
        err.textContent = 'Por seguridad, cierra sesión y vuelve a iniciarla antes de cambiar la contraseña.';
      } else {
        err.textContent = 'Error: ' + e.message;
      }
      err.style.display = 'inline';
    }
  }

  async function confirmDeleteAccount() {
    if (!confirm('¿Eliminar tu cuenta? Se borrarán todos tus personajes e historial. Esta acción no se puede deshacer.')) return;
    if (!confirm('¿Estás seguro? Esta acción es permanente.')) return;

    try {
      // Borrar datos de Firestore
      const uid  = currentUid;
      const snap = await db.collection('users').doc(uid).collection('characters').get();
      const batch = db.batch();
      snap.docs.forEach(d => batch.delete(d.ref));
      await batch.commit();

      await auth.currentUser.delete();
      window.location.href = 'index.html';
    } catch (e) {
      if (e.code === 'auth/requires-recent-login') {
        alert('Por seguridad, cierra sesión y vuelve a iniciarla antes de eliminar tu cuenta.');
      } else {
        alert('Error: ' + e.message);
      }
    }
  }
</script>
</body>
</html>
